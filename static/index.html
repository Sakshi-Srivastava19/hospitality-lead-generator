<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Register — Hospitality Leads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="masthead">
  <div class="masthead__inner">
    <div class="masthead__mark">LR</div>
    <div class="masthead__title">
      <h1>The Lead Register</h1>
      <p class="masthead__sub">A working ledger for hospitality &amp; property leads</p>
    </div>
    <div class="masthead__meta">
      <span id="todayDate"></span>
    </div>
  </div>
</header>

<main class="page">

  <!-- ── Entry form ─────────────────────────────────────────────── -->
  <section class="card entry" id="entryCard">
    <div class="card__label">New Search</div>

    <div class="field">
      <label for="cityInput">City</label>
      <input list="cityList" id="cityInput" placeholder="e.g. Jaipur" autocomplete="off">
      <datalist id="cityList"></datalist>
    </div>

    <div class="field">
      <label>Property type</label>
      <div class="chip-row" id="propertyTypeRow"></div>
    </div>

    <div class="field">
      <label>Price band <span class="field__hint">(pick one or more)</span></label>
      <div class="chip-row" id="bandRow"></div>
      <button type="button" class="link-btn" id="customBandToggle">+ Add a custom price range</button>
      <div class="custom-band" id="customBandForm" hidden>
        <span>₹</span>
        <input type="number" id="customLow" placeholder="Min" min="0" step="1000">
        <span>–</span>
        <span>₹</span>
        <input type="number" id="customHigh" placeholder="Max" min="0" step="1000">
        <button type="button" class="btn btn--ghost btn--small" id="customBandAdd">Add</button>
      </div>
    </div>

    <div class="entry__footer">
      <p class="entry__error" id="formError"></p>
      <button type="button" class="btn btn--primary" id="startBtn">Start collecting leads</button>
    </div>
  </section>

  <!-- ── Run progress ───────────────────────────────────────────── -->
  <section class="card run hidden" id="runCard">
    <div class="card__label">Collecting</div>
    <div class="run__headline" id="runHeadline">—</div>
    <div class="run__status" id="runStatus">Starting…</div>
    <pre class="run__log" id="runLog"></pre>
    <div class="run__footer">
      <button type="button" class="btn btn--ghost" id="cancelBtn">Cancel</button>
      <button type="button" class="btn btn--primary hidden" id="viewResultsBtn">View leads →</button>
      <button type="button" class="btn btn--ghost hidden" id="newSearchBtn">New search</button>
    </div>
  </section>

  <!-- ── Results ────────────────────────────────────────────────── -->
  <section class="card results hidden" id="resultsCard">
    <div class="card__label">Leads</div>
    <div class="results__controls">
      <div class="tabs" id="bandTabs"></div>
      <div class="results__search">
        <input type="text" id="searchInput" placeholder="Search by name…">
      </div>
      <button type="button" class="btn btn--ghost btn--small" id="downloadBtn">Download CSV</button>
    </div>
    <div class="results__count" id="resultsCount"></div>
    <div class="table-wrap">
      <table id="resultsTable">
        <thead><tr id="resultsHead"></tr></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
    <div class="results__footer">
      <button type="button" class="btn btn--ghost" id="backToFormBtn">← New search</button>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
